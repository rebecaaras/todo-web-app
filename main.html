<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="dist/css/main.css">
    <title>Todo App</title>
</head>
<body>
    <div class="background"></div>
    <!-- <img class="background-image" src="images/background-1.jpg"> -->
    <header>
        <h1 class="title">Todo</h1>
        <img class="logo" src="images/light.png">
    </header>
    <section class="todo-app">  
        <form class="todo-box input-box">
            <input class="todo-input" type="text" placeholder="Create a new todo...">
            <button class="todo-button" type="submit">Add</button>
        </form>
        <div class="new-activity-bottom-space"></div>
        <div class="todo-box">
            <p>Task 1</p>
            <button class="todo-button" type="delete">X</button>
        </div>
        <div class="todo-box">
            <p>Task 2</p>
            <button class="todo-button" type="delete">X</button>
        </div>
        <div class="todo-box">
            <p>Task 3</p>
            <button class="todo-button" type="delete">X</button>
        </div>
    </section>
</body>
</html>
